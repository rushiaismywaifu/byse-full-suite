name: Byse CI & Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天 09:00 UTC = 17:00 台北，檢查 byse.sx API 是否還活著
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests rich flake8 black
          pip install yt-dlp

      - name: Lint with flake8 (only critical errors)
        run: |
          flake8 byse_full_suite/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting with black
        run: |
          black --check byse_full_suite/ || echo "black format warning - not blocking"

      - name: Compile check
        run: |
          python -m py_compile byse_full_suite/sdk.py byse_full_suite/cli.py byse_full_suite/downloader.py byse_uploader.py byse_full_suite/server.py

      - name: Test SDK test_all (needs BYSE_API_KEY secret)
        if: ${{ secrets.BYSE_API_KEY != '' }}
        env:
          BYSE_API_KEY: ${{ secrets.BYSE_API_KEY }}
        run: |
          python byse_full_suite/cli.py --non-interactive
          python -c "
          from byse_full_suite.sdk import ByseSDK
          import os
          key=os.getenv('BYSE_API_KEY')
          sdk=ByseSDK(key)
          print('account/info:', sdk.account_info().get('status'))
          print('upload/server:', sdk.upload_server())
          print('file/list:', sdk.file_list(per_page=1).get('status'))
          "

      - name: Test without key
        if: ${{ secrets.BYSE_API_KEY == '' }}
        run: |
          echo "No BYSE_API_KEY secret set, skip private tests - compile already OK"

  deploy-pages:
    name: Deploy Dashboard to GitHub Pages
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _pages
          cp byse_full_suite/dashboard.html _pages/index.html
          cp -r byse_full_suite _pages/
          cp README.md _pages/README.md
          echo "<!-- Deployed at $(date) -->" >> _pages/index.html
          ls -lh _pages/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_pages
          publish_branch: gh-pages
          commit_message: "docs: deploy dashboard to pages (auto)"
          # 如果 gh-pages 第一次不存在，會自動建立

  secret-scan:
    name: Light Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no hardcoded API keys in source (exclude workflows)
        run: |
          echo "Scanning for accidentally committed repo.json / .env ..."
          ! test -f repo.json || (echo "repo.json Found! Should be gitignored" && exit 1)
          ! test -f .env || (echo ".env Found!" && exit 1)
          # 檢查是否有 ghp_ token 被誤推 (排除 .github 目錄本身的範例)
          if grep -R --exclude-dir=.git --exclude-dir=.github -n "ghp_[A-Za-z0-9]\{20,\}" . ; then
            echo "Possible GitHub token found in source!"
            exit 1
          fi
          echo "Secret scan passed"
