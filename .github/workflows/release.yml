name: Release to GitHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '手動發版版本號，例如 v2.1.0'
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package (zip)
        run: |
          pip install build
          if [ ! -f pyproject.toml ]; then
          cat > pyproject.toml << 'PYTOML'
          [build-system]
          requires = ["setuptools>=61.0"]
          build-backend = "setuptools.build_meta"
          [project]
          name = "byse-full-suite"
          version = "2.0.0"
          description = "Byse.sx / Filemoon 完整 API SDK + CLI + Dashboard + Downloader"
          readme = "README.md"
          requires-python = ">=3.8"
          dependencies = ["requests","tqdm"]
          [project.optional-dependencies]
          rich = ["rich"]
          ytdlp = ["yt-dlp"]
          PYTOML
          fi
          python -m build
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
