name: Release to GitHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '手動發版版本號，例如 v2.1.0'
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package (使用專案內 pyproject.toml)
        run: |
          # pyproject.toml 已存在於專案根目錄, 不再臨時生成
          test -f pyproject.toml || { echo "ERROR: pyproject.toml missing"; exit 1; }
          python -m build
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
